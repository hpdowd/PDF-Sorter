name: Build and Release

# Builds run only on GitHub (the repo is mirrored here from Gitea).
#
# Versioning model (which branch builds what):
#   * Push to main  -> always builds the program zip + installer. Publishes a
#                      GitHub Release ONLY when the version in src/__init__.py
#                      has not been released yet (release v<version> doesn't
#                      exist). So bumping __version__ and merging to main cuts a
#                      release; ordinary commits to main just build artifacts.
#   * Manual run    -> builds artifacts only, never releases (for test builds).
#
# IMPORTANT — tag anchoring: when cutting a release, also create the vX.Y.Z tag
# and push it to Gitea together with main (`git push origin main vX.Y.Z`). The
# Gitea->GitHub push mirror PRUNES any tag not present in Gitea, so a tag created
# only by this workflow gets deleted on the next mirror sync (which drafts the
# release). Pushing the tag from Gitea keeps it stable. We therefore do NOT
# trigger on tag pushes (main-push is the single reliable trigger).
on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (e.g. 1.1). Defaults to src/__init__.py."
        required: false
        default: ""

permissions:
  contents: write # required to create releases and upload assets

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r config/requirements-build.txt

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            v="${GITHUB_REF_NAME#v}"
            tag="${GITHUB_REF_NAME}"
          elif [ -n "${{ github.event.inputs.version }}" ]; then
            v="${{ github.event.inputs.version }}"
            tag="v$v"
          else
            v="$(python -c "import pathlib,re; print(re.search(r'__version__\s*=\s*[\x27\x22]([^\x27\x22]+)', pathlib.Path('src/__init__.py').read_text()).group(1))")"
            tag="v$v"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Building $tag (version $v)"

      - name: Build application
        run: python scripts/build_exe.py

      - name: Package program zip
        shell: pwsh
        # Zip the built app dir. The installer downloads this asset by the exact
        # name OCR_File_Sorter.zip (releases/latest/download/OCR_File_Sorter.zip),
        # so the name must not change.
        run: Compress-Archive -Path "dist/OCR File Sorter/*" -DestinationPath "dist/OCR_File_Sorter.zip" -Force

      - name: Build download installer
        run: python scripts/build_installer_exe.py

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: OCR-File-Sorter-${{ steps.version.outputs.version }}
          path: |
            dist/OCR_File_Sorter.zip
            dist/OCR_File_Sorter_Download_Installer.exe
          if-no-files-found: error

      - name: Publish release (new versions only)
        # Only on push events (main or tag), never on manual/test runs.
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          tag="${{ steps.version.outputs.tag }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists - skipping."
            echo "Bump __version__ in src/__init__.py to publish the next version."
            exit 0
          fi
          gh release create "$tag" \
            "dist/OCR_File_Sorter.zip" \
            "dist/OCR_File_Sorter_Download_Installer.exe" \
            --target "${{ github.sha }}" \
            --title "OCR File Sorter $tag" \
            --latest \
            --generate-notes
